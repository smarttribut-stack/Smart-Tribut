services:
  - type: web
    name: smart-tribut-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false  # Lo agregas manualmente en el dashboard de Render
